<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/simple-lift/favicon.svg" />
    <link rel="apple-touch-icon" href="/simple-lift/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#101012" />
    <meta name="description" content="Build an effective compound-lift workout program with almost no guesswork." />
    <title>Simple Lift</title>
    <script>
      // Set the theme before first paint to avoid a flash (defaults to dark).
      try {
        var s = JSON.parse(localStorage.getItem('simple-lift:settings'));
        document.documentElement.setAttribute('data-theme', s && s.theme === 'light' ? 'light' : 'dark');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
